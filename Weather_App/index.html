<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <h2>Weather App</h2>
        <div class="search-row">
            <input type="text" id="city" placeholder="Type City">
            <button type="button" id="search-btn" onclick="getWeather()">Search</button>
        </div>
        <div class="weather-display" id="weather-display">
            <div id="loading" class="loading" hidden aria-live="polite" aria-busy="false">
                <span class="loading-spinner" aria-hidden="true"></span>
                <span class="loading-text">Loading weather…</span>
            </div>
            <div id="weather-content" class="weather-content" hidden>
                <div class="weather-main-box">
                    <div id="weather-emoji" class="weather-emoji" role="img" aria-label=""></div>
                    <div id="main-output" class="weather-main-text"></div>
                </div>
                <div class="weather-details-box">
                    <div id="details-output" class="weather-details-text"></div>
                </div>
            </div>
            <pre id="output" class="weather-text" hidden></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
